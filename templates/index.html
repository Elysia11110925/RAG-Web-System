<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>RAG 知识库问答系统</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --input-bg: #16162b;
            --input-focus: #1e1e38;
            --accent: #f97316;
            --accent-hover: #fb923c;
            --border: #2d2d4a;
            --text: #d0d0e0;
            --text-heading: #e8e8f0;
            --text-muted: #a0a0b8;
            --text-hint: #555;
            --positive: #10b981;
            --danger: #ef4444;
            --danger-text: #f87171;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 40px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        /* === Layout === */
        .app {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            overflow: hidden;
        }

        /* === Sidebar === */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 20px;
            color: var(--text-heading);
            margin-bottom: 4px;
        }

        .sidebar-header .subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        .upload-area {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--input-bg);
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--input-focus);
        }

        .upload-zone .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .upload-zone .text {
            font-size: 13px;
            color: var(--text-muted);
        }

        .upload-zone .hint {
            font-size: 11px;
            color: var(--text-hint);
            margin-top: 4px;
        }

        .upload-status {
            margin-top: 10px;
            font-size: 12px;
            color: var(--accent);
            text-align: center;
            display: none;
        }

        .upload-status.show { display: block; }
        .upload-status.error { color: var(--danger-text); }
        .upload-status.success { color: var(--positive); }

        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .doc-list-empty {
            padding: 32px 20px;
            text-align: center;
            color: var(--text-hint);
            font-size: 13px;
        }

        .doc-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            gap: 10px;
            border-bottom: 1px solid rgba(45,45,74,0.5);
            transition: background 0.15s;
        }

        .doc-item:hover { background: rgba(255,255,255,0.02); }

        .doc-icon { font-size: 18px; flex-shrink: 0; }

        .doc-info { flex: 1; min-width: 0; }

        .doc-name {
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-meta {
            font-size: 11px;
            color: var(--text-hint);
            margin-top: 2px;
        }

        .doc-delete {
            background: none;
            border: none;
            color: var(--text-hint);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .doc-delete:hover { color: var(--danger-text); background: rgba(239,68,68,0.1); }

        .sidebar-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-hint);
            display: flex;
            justify-content: space-between;
        }

        /* === Main Chat Area === */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--positive);
            flex-shrink: 0;
        }

        .chat-header .status-dot.offline { background: var(--danger); }

        .chat-header h2 {
            font-size: 16px;
            color: var(--text-heading);
            flex: 1;
        }

        .chat-header .model-badge {
            font-size: 11px;
            color: var(--accent);
            background: rgba(249,115,22,0.1);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid rgba(249,115,22,0.2);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .chat-empty .big-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .chat-empty h3 {
            font-size: 18px;
            color: var(--text-heading);
            margin-bottom: 8px;
        }

        .chat-empty p {
            font-size: 13px;
            color: var(--text-muted);
            max-width: 360px;
            line-height: 1.6;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar { background: var(--accent); }

        .message.assistant .avatar { background: #4a4a6a; }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message.assistant .bubble .sources {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        .message.assistant .bubble .sources span {
            display: inline-block;
            background: rgba(249,115,22,0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px 4px 2px 0;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        /* === Input Area === */
        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        .input-row textarea:focus {
            border-color: var(--accent);
            background: var(--input-focus);
        }

        .input-row textarea::placeholder { color: var(--text-hint); }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }

        .btn-send:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-hint);
            margin-top: 8px;
            text-align: center;
        }

        .input-hint kbd {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 6px;
            font-family: inherit;
            font-size: 10px;
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            .app { flex-direction: column; }
            .sidebar {
                width: 100%;
                min-width: 100%;
                max-height: 40vh;
            }
            .main { height: 60vh; }
            .message { max-width: 92%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📚 知识库</h1>
                <div class="subtitle">上传文档，构建私有知识库</div>
            </div>

            <div class="upload-area">
                <div class="upload-zone" id="uploadZone">
                    <div class="icon">📁</div>
                    <div class="text">点击或拖拽上传文档</div>
                    <div class="hint">支持 PDF、TXT 格式</div>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.txt" style="display:none">
                <div class="upload-status" id="uploadStatus"></div>
            </div>

            <div class="doc-list" id="docList">
                <div class="doc-list-empty">暂无文档，上传PDF或TXT开始使用</div>
            </div>

            <div class="sidebar-footer">
                <span id="chunkCount">总片段</span>
                <span>RAG · Week 3</span>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="main">
            <div class="chat-header">
                <div class="status-dot" id="statusDot"></div>
                <h2>💬 知识库问答</h2>
                <span class="model-badge">DeepSeek</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="chat-empty" id="chatEmpty">
                    <div class="big-icon">🤖</div>
                    <h3>上传文档开始对话</h3>
                    <p>在左侧上传PDF或TXT文档后，即可基于知识库内容进行问答。我会检索相关片段后给出有据可查的回答。</p>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-row">
                    <textarea id="questionInput"
                              placeholder="输入你的问题，基于知识库回答..."
                              rows="1"
                              autofocus></textarea>
                    <button class="btn-send" id="sendBtn" title="发送 (Enter)">➤</button>
                </div>
                <div class="input-hint">
                    按 <kbd>Enter</kbd> 发送，Shift+Enter 换行
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        // DOM Elements
        // ============================================================
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const docList = document.getElementById('docList');
        const chunkCount = document.getElementById('chunkCount');
        const statusDot = document.getElementById('statusDot');
        const chatMessages = document.getElementById('chatMessages');
        const chatEmpty = document.getElementById('chatEmpty');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');

        let isStreaming = false;
        let currentAssistantBubble = null;

        // ============================================================
        // Initialization
        // ============================================================
        async function init() {
            await loadDocuments();
            await checkHealth();
        }

        async function checkHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                if (data.status === 'ok') {
                    statusDot.classList.remove('offline');
                }
            } catch (e) {
                statusDot.classList.add('offline');
            }
        }

        // ============================================================
        // Document Management
        // ============================================================
        async function loadDocuments() {
            try {
                const res = await fetch('/api/documents');
                const data = await res.json();
                renderDocList(data.documents);
                chunkCount.textContent = '总片段: ' + data.total_chunks;
            } catch (e) {
                chunkCount.textContent = '加载失败';
            }
        }

        function renderDocList(docs) {
            docList.innerHTML = '';
            if (docs.length === 0) {
                docList.innerHTML = '<div class="doc-list-empty">暂无文档，上传PDF或TXT开始使用</div>';
                return;
            }
            docs.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'doc-item';
                const ext = doc.name.split('.').pop().toLowerCase();
                const icon = ext === 'pdf' ? '📄' : '📝';
                const sizeKB = (doc.size / 1024).toFixed(1);
                item.innerHTML = `
                    <span class="doc-icon">${icon}</span>
                    <div class="doc-info">
                        <div class="doc-name" title="${doc.name}">${doc.name}</div>
                        <div class="doc-meta">片段 ${doc.chunks} · ${sizeKB} KB</div>
                    </div>
                    <button class="doc-delete" onclick="deleteDoc('${doc.id}')" title="删除文档">✕</button>
                `;
                docList.appendChild(item);
            });
        }

        async function deleteDoc(docId) {
            if (!confirm('确认删除此文档及其所有片段？')) return;
            try {
                const res = await fetch(`/api/documents/${docId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    await loadDocuments();
                }
            } catch (e) {
                alert('删除失败，请重试');
            }
        }

        // Upload handlers
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
        uploadZone.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFile(files[0]);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                uploadFile(fileInput.files[0]);
                fileInput.value = '';
            }
        });

        async function uploadFile(file) {
            uploadStatus.textContent = '正在上传并处理...';
            uploadStatus.className = 'upload-status show';
            uploadStatus.style.color = 'var(--accent)';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if (res.ok && data.success) {
                    uploadStatus.textContent = '上传成功！共 ' + data.chunks;
                    uploadStatus.className = 'upload-status show success';
                    await loadDocuments();
                } else {
                    uploadStatus.textContent = data.error || '上传失败';
                    uploadStatus.className = 'upload-status show error';
                }
            } catch (e) {
                uploadStatus.textContent = '网络错误，上传失败';
                uploadStatus.className = 'upload-status show error';
            }

            setTimeout(() => { uploadStatus.className = 'upload-status'; }, 4000);
        }

        // ============================================================
        // Chat
        // ============================================================
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question || isStreaming) return;
            if (document.querySelectorAll('.doc-item').length === 0 && !document.getElementById('chatEmpty')) {
                // Allow even without docs - server will return error
            }

            // Hide empty state
            chatEmpty.style.display = 'none';

            // Add user message
            addMessage('user', question);
            questionInput.value = '';
            questionInput.style.height = 'auto';
            updateSendButton();

            // Add assistant placeholder with typing indicator
            const msgEl = addMessage('assistant', '<div class="typing-indicator"><span></span><span></span><span></span></div>');
            currentAssistantBubble = msgEl.querySelector('.bubble');

            isStreaming = true;
            sendBtn.disabled = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    currentAssistantBubble.innerHTML = '错误：' + (err.error || '未知错误');
                    finishStreaming();
                    return;
                }

                // Read SSE stream
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6);
                        if (!dataStr) continue;

                        try {
                            const data = JSON.parse(dataStr);

                            if (data.type === 'token') {
                                fullText += data.content;
                                currentAssistantBubble.textContent = fullText;
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            } else if (data.type === 'sources') {
                                const sourcesDiv = document.createElement('div');
                                sourcesDiv.className = 'sources';
                                sourcesDiv.innerHTML = '📖 参考来源： ' +
                                    data.sources.map(s => `<span>${s.name} (${s.count})</span>`).join(' ');
                                currentAssistantBubble.appendChild(sourcesDiv);
                            } else if (data.type === 'error') {
                                currentAssistantBubble.innerHTML = '错误：' + data.content;
                            }
                        } catch (e) { /* skip malformed line */ }
                    }
                }

                if (!fullText && currentAssistantBubble.textContent.includes('typing')) {
                    currentAssistantBubble.innerHTML = '未能生成回答，请重试。';
                }
            } catch (e) {
                currentAssistantBubble.innerHTML = '网络错误：' + e.message;
            }

            finishStreaming();
        }

        function finishStreaming() {
            isStreaming = false;
            currentAssistantBubble = null;
            sendBtn.disabled = false;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            div.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">${content}</div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        // ============================================================
        // Input Handling
        // ============================================================
        questionInput.addEventListener('input', () => {
            questionInput.style.height = 'auto';
            questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
            updateSendButton();
        });

        questionInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function updateSendButton() {
            sendBtn.disabled = isStreaming || questionInput.value.trim() === '';
        }

        sendBtn.addEventListener('click', sendMessage);

        // Initialize
        init();
    </script>
</body>
</html>
